# prod 환경 오버라이드
# esoRoleArn, awsRegion 은 apply.sh 가 helm.parameters 로 주입

externalSecret:
  secretStoreName: aws-parameter-store
  refreshInterval: 1h
  grafanaAdminPasswordKey: /ticketing/prod/GRAFANA_ADMIN_PASSWORD
  slackWebhookKey: /ticketing/prod/ALERTMANAGER_SLACK_WEBHOOK

kube-prometheus-stack:
  prometheusOperator:
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false
  grafana:
    adminUser: admin
    adminPassword: soldesk1
    deploymentStrategy:
      type: Recreate
    persistence:
      size: 10Gi
    ingress:
      enabled: true
      ingressClassName: alb
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
        alb.ingress.kubernetes.io/backend-protocol: HTTP
        alb.ingress.kubernetes.io/healthcheck-path: /api/health
      path: /
      pathType: Prefix
  prometheus:
    prometheusSpec:
      storageSpec:
        volumeClaimTemplate:
          spec:
            resources:
              requests:
                storage: 30Gi

loki:
  deploymentMode: SingleBinary
  loki:
    useTestSchema: true
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
  singleBinary:
    replicas: 1
    persistence:
      size: 20Gi
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
