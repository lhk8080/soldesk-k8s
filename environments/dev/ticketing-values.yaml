# dev 환경 오버라이드
# 계정 고유 값(image repo, role ARN, SQS URL, S3 bucket)은 apply.sh 가 helm.parameters 로 주입

image:
  was:
    tag: "921959e"
  worker:
    tag: "2366e23"

config:
  env: dev
  awsRegion: ap-northeast-2
  dbName: ticketing_dev
  sqsQueueName: ticketing-reservation-dev.fifo

priorityClass:
  enabled: false
clusterSecretStore:
  enabled: false

# dev 는 ops ALB(IngressGroup) 공유 — 비용 절감용. API GW 우회
# host / wafAclArn 은 apply.sh 가 helm.parameters 로 주입
ingress:
  scheme: internet-facing
  groupName: soldesk-ops
  groupOrder: "30"

externalSecret:
  secretStoreName: aws-parameter-store
  refreshInterval: 1h
  dbWriterHostKey: /ticketing/dev/DB_WRITER_HOST
  dbReaderHostKey: /ticketing/dev/DB_READER_HOST
  dbUserKey: /ticketing/dev/DB_USER
  dbPasswordKey: /ticketing/dev/DB_PASSWORD
  elasticachePrimaryEndpointKey: /ticketing/dev/ELASTICACHE_PRIMARY_ENDPOINT
  redisHostKey: /ticketing/dev/REDIS_HOST

backup:
  enabled: false
