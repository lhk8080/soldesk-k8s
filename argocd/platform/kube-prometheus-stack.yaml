# kube-prometheus-stack (Prometheus + Grafana + Alertmanager + Operator).
# 로컬 charts/monitoring Application(sync-wave 1)이 ESO Secret(grafana-admin,
# alertmanager-slack)과 Exporter 들을 먼저 깔아두면 이 Application(sync-wave 2)이
# 그 Secret 을 existingSecret / alertmanager secret mount 로 참조한다.
#
# nodeExporter/kubeStateMetrics 는 t3.small 노드 리소스 절약 위해 비활성.
# Loki datasource 는 grafana.additionalDataSources 로 선언 (Loki Application 별도).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 61.3.2
    helm:
      releaseName: kube-prometheus-stack
      values: |
        # ── Prometheus ─────────────────────────────────────────
        prometheus:
          prometheusSpec:
            retention: 15d
            # monitoring chart 의 ServiceMonitor(release=kube-prometheus-stack)도 픽업.
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            resources:
              requests:
                cpu: 200m
                memory: 400Mi
              limits:
                cpu: 500m
                memory: 768Mi
            additionalScrapeConfigs:
              - job_name: 'read-api'
                kubernetes_sd_configs:
                  - role: endpoints
                    namespaces:
                      names: [ticketing]
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_name]
                    regex: read-api
                    action: keep
                  - source_labels: [__meta_kubernetes_endpoint_port_name]
                    regex: metrics
                    action: keep
              - job_name: 'write-api'
                kubernetes_sd_configs:
                  - role: endpoints
                    namespaces:
                      names: [ticketing]
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_name]
                    regex: write-api
                    action: keep
                  - source_labels: [__meta_kubernetes_endpoint_port_name]
                    regex: metrics
                    action: keep
              - job_name: 'worker-svc'
                kubernetes_sd_configs:
                  - role: endpoints
                    namespaces:
                      names: [ticketing]
                relabel_configs:
                  - source_labels: [__meta_kubernetes_service_name]
                    regex: worker-svc
                    action: keep
                  - source_labels: [__meta_kubernetes_endpoint_port_name]
                    regex: metrics
                    action: keep

        # ── Grafana ────────────────────────────────────────────
        grafana:
          # 평문 adminPassword 제거 — ESO 가 SSM 에서 동기화한 grafana-admin Secret 사용.
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          persistence:
            enabled: true
            storageClassName: gp3
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          service:
            type: ClusterIP
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
              uid: loki
              editable: false
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: 'default'
                  orgId: 1
                  folder: ''
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              labelValue: "1"
              searchNamespace: monitoring
          grafana.ini:
            server:
              root_url: "%(protocol)s://%(domain)s/grafana"
              serve_from_sub_path: true

        # ── AlertManager ───────────────────────────────────────
        alertmanager:
          alertmanagerSpec:
            # ESO 가 동기화한 alertmanager-slack Secret 을 /etc/alertmanager/secrets/alertmanager-slack 에 마운트.
            secrets:
              - alertmanager-slack
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi
            resources:
              requests:
                cpu: 50m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
          config:
            global:
              resolve_timeout: 5m
              slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack/slack_api_url
            route:
              group_by: ['alertname', 'severity']
              group_wait: 10s
              group_interval: 5m
              repeat_interval: 1h
              receiver: 'slack'
              routes:
                - match:
                    severity: critical
                  receiver: 'slack'
                  repeat_interval: 15m
            receivers:
              - name: 'slack'
                slack_configs:
                  - send_resolved: true
                    channel: '#alerts'
                    title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
                    text: >-
                      {{ range .Alerts }}
                      *severity*: {{ .Labels.severity }}
                      *summary*: {{ .Annotations.summary }}
                      *starts*: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
                      ---
                      {{ end }}
            inhibit_rules:
              - source_match:
                  severity: 'critical'
                target_match:
                  severity: 'warning'
                equal: ['alertname']

        # ── Node Exporter / kube-state-metrics ────────────────
        # t3.small 노드 리소스 절약 — 필요시 개별 활성화.
        nodeExporter:
          enabled: false
        kubeStateMetrics:
          enabled: false

        # ── Prometheus Operator ────────────────────────────────
        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
