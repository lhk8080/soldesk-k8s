# External Secrets Operator (ESO) 설치.
# ticketing 차트의 ExternalSecret/SecretStore가 동기화되기 전에 CRD가 있어야 하므로
# ticketing Application 보다 먼저 sync 되어야 한다 (sync-wave: -1).
#
# IRSA role ARN 은 계정마다 다르므로 git 에는 placeholder 만 두고
# soldesk-infra/terraform/apply.sh 가 terraform output -raw external_secrets_role_arn
# 로 읽어 helm parameter 로 런타임 주입한다.
#
# 권한 모델:
#   ESO 컨트롤러 Pod는 external-secrets ns에서 돌지만,
#   SecretStore.spec.provider.aws.auth.jwt.serviceAccountRef = ticketing/ticketing-eso-sa
#   로 ticketing ns의 SA 토큰을 빌려와 STS AssumeRoleWithWebIdentity.
#   → IRSA trust는 ticketing/ticketing-eso-sa 만 허용 (terraform external_secrets 모듈 참고).
#   → 따라서 ticketing-eso-sa 자체는 차트(soldesk-k8s/charts/ticketing/templates/serviceaccount.yaml)
#     에서 role-arn annotation 과 함께 생성된다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.4
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true
        # 컨트롤러 자체는 IRSA 불필요 (실제 AWS 호출은 ticketing-eso-sa 토큰으로)
        serviceAccount:
          create: true
          name: external-secrets
        webhook:
          create: true
        certController:
          create: true
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
