# 로컬 charts/monitoring — ESO Secret(ExternalSecret) + SecretStore + exporters + PrometheusRule + Grafana Ingress.
# sync-wave 1: kube-prometheus-stack(sync-wave 2) 보다 먼저 올라가서 Grafana/Alertmanager 가 참조할 Secret 을 준비.
#
# 계정 고유 값(IRSA role ARN / SSM prefix / region)은 apply.sh 가 helm.parameters 로 런타임 주입.
# (external-secrets.yaml / ticketing Application 패턴과 동일.)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/lhk8080/soldesk-k8s.git
    targetRevision: main
    path: charts/monitoring
    helm:
      releaseName: monitoring
      # 실제 roleArn/region/ssmPrefix 값은 apply.sh 가 parameters 로 주입 (placeholder).
      parameters:
        - name: externalSecrets.roleArn
          value: ""
        - name: externalSecrets.region
          value: ap-northeast-2
        - name: externalSecrets.ssmPrefix
          value: /ticketing/prod
        - name: cloudwatchExporter.roleArn
          value: ""
        - name: cloudwatchExporter.region
          value: ap-northeast-2
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /spec/target/deletionPolicy
      jqPathExpressions:
        - .spec.data[].remoteRef.conversionStrategy
        - .spec.data[].remoteRef.decodingStrategy
        - .spec.data[].remoteRef.metadataPolicy
