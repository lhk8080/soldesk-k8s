{{- if .Values.redisExporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: {{ .Values.namespace }}
  labels:
    app: redis-exporter
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-exporter
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: exporter
          image: {{ .Values.redisExporter.image }}
          env:
            # ElastiCache endpoint (host only) → redis://host:6379 로 조립
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redisExporter.redisHostSecretName }}
                  key: {{ .Values.redisExporter.redisHostSecretKey }}
            - name: REDIS_ADDR
              value: "redis://$(REDIS_HOST):6379"
          ports:
            - name: metrics
              containerPort: {{ .Values.redisExporter.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.redisExporter.resources | nindent 12 }}
{{- end }}
