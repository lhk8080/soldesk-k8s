{{- if .Values.externalSecrets.enabled }}
# ESO ServiceAccount. SecretStore.spec.provider.aws.auth.jwt.serviceAccountRef 가 이걸 참조 →
# ESO 컨트롤러(external-secrets ns)가 이 SA 토큰으로 STS AssumeRoleWithWebIdentity 수행.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.externalSecrets.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.externalSecrets.roleArn | quote }}
  labels:
    {{- include "monitoring.labels" . | nindent 4 }}
{{- end }}
