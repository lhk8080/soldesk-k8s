{{- if and .Values.externalSecrets.enabled .Values.alertmanagerSlack.enabled }}
# Alertmanager Slack webhook URL (SSM /ticketing/prod/alertmanager/slack_webhook).
# kube-prometheus-stack Alertmanager 설정에서 secret 마운트 또는 alertmanagerFiles 의
# global.slack_api_url_file 로 참조.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.alertmanagerSlack.secretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  target:
    name: {{ .Values.alertmanagerSlack.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.alertmanagerSlack.key }}
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/alertmanager/slack_webhook
{{- end }}
