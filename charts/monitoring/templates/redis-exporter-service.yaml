{{- if .Values.redisExporter.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: {{ .Values.namespace }}
  labels:
    app: redis-exporter
    {{- include "monitoring.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: redis-exporter
  ports:
    - name: metrics
      port: {{ .Values.redisExporter.port }}
      targetPort: metrics
{{- end }}
