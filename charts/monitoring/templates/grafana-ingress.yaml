{{- if .Values.grafana.host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/group.name: {{ .Values.grafana.ingressGroupName | quote }}
    alb.ingress.kubernetes.io/group.order: "20"
    {{- if .Values.grafana.wafAclArn }}
    alb.ingress.kubernetes.io/wafv2-acl-arn: {{ .Values.grafana.wafAclArn | quote }}
    {{- end }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.grafana.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-grafana
                port:
                  number: 80
{{- end }}
