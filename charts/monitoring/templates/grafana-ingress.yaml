{{- if .Values.grafanaIngress.enabled }}
# Grafana 를 ticketing ALB 와 같은 group 에 붙여 /grafana 경로로 노출.
# group.order 200 — ticketing 앱 rule 뒤에 평가.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: {{ .Values.grafanaIngress.scheme | quote }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: {{ .Values.grafanaIngress.groupName | quote }}
    alb.ingress.kubernetes.io/group.order: {{ .Values.grafanaIngress.groupOrder | quote }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /grafana/api/health
spec:
  rules:
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.grafanaIngress.serviceName }}
                port:
                  number: {{ .Values.grafanaIngress.servicePort }}
{{- end }}
