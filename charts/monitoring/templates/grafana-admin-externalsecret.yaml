{{- if and .Values.externalSecrets.enabled .Values.grafanaAdmin.enabled }}
# Grafana admin 크레덴셜 (SSM /ticketing/prod/grafana/{admin_user,admin_password}).
# kube-prometheus-stack values 의 grafana.admin.existingSecret = {{ .Values.grafanaAdmin.secretName }} 로 참조.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.grafanaAdmin.secretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  target:
    name: {{ .Values.grafanaAdmin.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.grafanaAdmin.userKey }}
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/grafana/admin_user
    - secretKey: {{ .Values.grafanaAdmin.passwordKey }}
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/grafana/admin_password
{{- end }}
