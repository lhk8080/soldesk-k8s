{{- if and .Values.externalSecrets.enabled .Values.redisExporter.enabled }}
# redis-exporter 가 ElastiCache endpoint 를 env 로 받기 위한 Secret.
# ticketing ns 의 ticketing-secrets 와 동일한 SSM key 참조(중복) — ns 경계 때문에 별도 생성.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.redisExporter.redisHostSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  target:
    name: {{ .Values.redisExporter.redisHostSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.redisExporter.redisHostSecretKey }}
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/redis/host
{{- end }}
