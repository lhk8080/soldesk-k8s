# 런타임 주입: apply.sh → helm.parameters 로 전달
esoRoleArn: ""
awsRegion: ap-northeast-2
ssmPrefix: /ticketing/prod

externalSecret:
  secretStoreName: aws-parameter-store
  refreshInterval: 1h
  grafanaAdminPasswordKey: /ticketing/prod/GRAFANA_ADMIN_PASSWORD
  slackWebhookKey: /ticketing/prod/ALERTMANAGER_SLACK_WEBHOOK

kube-prometheus-stack:
  namespaceOverride: monitoring
  grafana:
    adminPassword: ""  # ESO로 주입 (grafana-admin-secret)
    existingSecret: grafana-admin-secret
    adminUser: admin
    priorityClassName: ticketing-priority-platform
    persistence:
      enabled: true
      storageClassName: gp3
      size: 10Gi
    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
  prometheus:
    prometheusSpec:
      priorityClassName: ticketing-priority-platform
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes: [ReadWriteOnce]
            resources:
              requests:
                storage: 30Gi
  alertmanager:
    alertmanagerSpec:
      priorityClassName: ticketing-priority-platform
  prometheusOperator:
    priorityClassName: ticketing-priority-platform

loki:
  loki:
    auth_enabled: false
    storage:
      type: filesystem
    commonConfig:
      replication_factor: 1
  singleBinary:
    replicas: 1
    priorityClassName: ticketing-priority-platform
    persistence:
      enabled: true
      storageClass: gp3
      size: 20Gi
  gateway:
    enabled: false
  # promtail은 별도 values로 설정 가능; 기본은 DaemonSet
