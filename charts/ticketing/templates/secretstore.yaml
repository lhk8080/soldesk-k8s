{{- if .Values.externalSecrets.enabled }}
# ESO가 SSM Parameter Store를 읽을 때 사용할 인증 컨텍스트.
# spec.provider.aws.auth.jwt.serviceAccountRef 가 가리키는 SA(ticketing-eso-sa)는
# IRSA annotation으로 IAM role(외부 terraform external_secrets 모듈)에 매핑됨.
# ESO 컨트롤러는 external-secrets ns에 있어도, 이 SA의 토큰으로 STS AssumeRoleWithWebIdentity 수행.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStoreName }}
  namespace: {{ .Values.namespace }}
spec:
  provider:
    aws:
      service: ParameterStore
      region: {{ .Values.externalSecrets.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.externalSecrets.serviceAccountName }}
{{- end }}
