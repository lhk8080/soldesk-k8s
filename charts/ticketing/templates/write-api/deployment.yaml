apiVersion: apps/v1
kind: Deployment
metadata:
  name: write-api
  namespace: ticketing
  labels:
    app: write-api
    pool: stable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: write-api
      pool: stable
  template:
    metadata:
      labels:
        app: write-api
        pool: stable
    spec:
      priorityClassName: ticketing-priority-write-api-stable
      enableServiceLinks: false
      serviceAccountName: sqs-access-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: write-api
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: write-api
      containers:
        - name: write-api
          image: {{ .Values.image.was.repository }}:{{ .Values.image.was.tag }}
          imagePullPolicy: Always
          command: ["uvicorn", "write_app:app", "--host", "0.0.0.0", "--port", "5001"]
          ports:
            - containerPort: 5001
          envFrom:
            - configMapRef:
                name: ticketing-config
            - secretRef:
                name: ticketing-secrets
          env:
            - name: CONCERT_FIFO_SHARDS
              value: "64"
          resources:
            requests:
              memory: "500Mi"
              cpu: "300m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/write/health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
