{{- if .Values.externalSecrets.enabled }}
# /ticketing/<env>/<카테고리>/<키> 형태의 SSM 파라미터를 ticketing-secrets 한 K8s Secret으로 모음.
# 키 이름은 SSM의 마지막 segment를 그대로 쓰지 않고, 앱이 기대하는 환경변수명(DB_PASSWORD 등)으로 명시 매핑.
# (dataFrom으로 prefix 통째 빨아오는 방법도 있으나 키 명명 충돌/오타 방지를 위해 명시 매핑 채택)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secretName }}
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: SecretStore
  target:
    name: {{ .Values.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: DB_WRITER_HOST
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/db/writer_host
    - secretKey: DB_READER_HOST
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/db/reader_host
    - secretKey: DB_USER
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/db/user
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/db/password
    - secretKey: ELASTICACHE_PRIMARY_ENDPOINT
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/redis/host
    - secretKey: REDIS_HOST
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/redis/host
    - secretKey: SQS_QUEUE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/sqs/queue_url
    - secretKey: SQS_QUEUE_INTERACTIVE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/sqs/ui_queue_url
    - secretKey: COGNITO_APP_CLIENT_ID
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/cognito/client_id
    - secretKey: COGNITO_ISSUER
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/cognito/issuer
    - secretKey: COGNITO_JWKS_URI
      remoteRef:
        key: {{ .Values.externalSecrets.ssmPrefix }}/cognito/jwks_uri
{{- end }}
