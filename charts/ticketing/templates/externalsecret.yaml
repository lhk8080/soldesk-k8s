apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ticketing-secrets
  namespace: ticketing
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecret.secretStoreName }}
  target:
    name: ticketing-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_WRITER_HOST
      remoteRef:
        key: {{ .Values.externalSecret.dbWriterHostKey }}
    - secretKey: DB_READER_HOST
      remoteRef:
        key: {{ .Values.externalSecret.dbReaderHostKey }}
    - secretKey: DB_USER
      remoteRef:
        key: {{ .Values.externalSecret.dbUserKey }}
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecret.dbPasswordKey }}
    - secretKey: ELASTICACHE_PRIMARY_ENDPOINT
      remoteRef:
        key: {{ .Values.externalSecret.elasticachePrimaryEndpointKey }}
    - secretKey: REDIS_HOST
      remoteRef:
        key: {{ .Values.externalSecret.redisHostKey }}
