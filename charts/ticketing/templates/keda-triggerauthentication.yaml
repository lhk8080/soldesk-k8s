{{/*
KEDA TriggerAuthentication — services 중 하나라도 keda.enabled=true면 생성.
*/}}
{{- $needTA := false -}}
{{- range $name, $svc := .Values.services -}}
  {{- if and $svc.keda $svc.keda.enabled -}}
    {{- $needTA = true -}}
  {{- end -}}
{{- end -}}
{{- if $needTA }}
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: {{ .Values.keda.triggerAuthentication.name }}
  namespace: {{ .Values.namespace }}
spec:
  podIdentity:
    provider: {{ .Values.keda.triggerAuthentication.podIdentityProvider }}
    identityOwner: {{ .Values.keda.triggerAuthentication.identityOwner }}
{{- end }}
