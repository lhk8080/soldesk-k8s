apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing-ingress
  namespace: ticketing
  annotations:
    # API GW VPC Link는 Internal ALB 필수 — internet-facing은 split-horizon DNS 미지원으로 9s timeout 발생
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    # Internal ALB SG inbound 허용 — 없으면 VPC Link → ALB 트래픽 차단
    alb.ingress.kubernetes.io/inbound-cidrs: "10.0.0.0/16"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /api/read
            pathType: Prefix
            backend:
              service:
                name: read-api
                port:
                  number: 5000
          - path: /api/write
            pathType: Prefix
            backend:
              service:
                name: write-api
                port:
                  number: 5001
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: read-api
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: read-api
                port:
                  number: 5000
