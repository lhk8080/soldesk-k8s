apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: ticketing-priority-devtools-protected
value: 270000
preemptionPolicy: Never
globalDefault: false
description: "devtools 보호(선점 없음) — tools-once 등"
