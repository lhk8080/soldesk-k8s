image:
  was:
    # 런타임 주입: apply.sh → argocd app set --helm-set image.was.repository=<ECR_URL>
    repository: ""
    tag: seed-pending
  worker:
    repository: ""
    tag: seed-pending

serviceAccount:
  # 런타임 주입: apply.sh → terraform output 에서 읽어 helm.parameters 로 전달
  sqsAccessRoleArn: ""
  dbBackupRoleArn: ""

config:
  awsRegion: ap-northeast-2
  # SQS queue URL: apply.sh 가 terraform output sqs_reservation_url 로 주입
  sqsQueueUrl: ""

backup:
  schedule: "0 * * * *"
  # apply.sh 가 terraform output frontend_bucket_id(assets bucket) 로 주입
  s3Bucket: ""

externalSecret:
  # ClusterSecretStore 이름 (argocd/cluster-secret-store.yaml 에서 생성)
  secretStoreName: aws-parameter-store
  refreshInterval: 1h
  # SSM Parameter Store 키 경로
  dbWriterHostKey: /ticketing/prod/DB_WRITER_HOST
  dbReaderHostKey: /ticketing/prod/DB_READER_HOST
  dbUserKey: /ticketing/prod/DB_USER
  dbPasswordKey: /ticketing/prod/DB_PASSWORD
  elasticachePrimaryEndpointKey: /ticketing/prod/ELASTICACHE_PRIMARY_ENDPOINT
  redisHostKey: /ticketing/prod/REDIS_HOST
