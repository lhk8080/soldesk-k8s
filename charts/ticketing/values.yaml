image:
  was:
    # 런타임 주입: apply.sh → argocd app set --helm-set image.was.repository=<ECR_URL>
    repository: ""
    tag: seed-pending
  worker:
    repository: ""
    tag: seed-pending

# 차트가 namespace 를 직접 만들지 여부. ArgoCD syncOptions CreateNamespace=true 와 중복 가능 → 끌 수도 있음.
namespace:
  create: true

# cluster-scoped 리소스 — 한 클러스터에 1번만 만들면 됨. dev 차트에선 false (prod 가 만든 것 공유).
priorityClass:
  enabled: true
clusterSecretStore:
  enabled: true

serviceAccount:
  # 런타임 주입: apply.sh → terraform output 에서 읽어 helm.parameters 로 전달
  sqsAccessRoleArn: ""
  dbBackupRoleArn: ""

config:
  awsRegion: ap-northeast-2
  dbName: ticketing
  sqsQueueName: ticketing-reservation.fifo
  # SQS queue URL: apply.sh 가 terraform output sqs_reservation_url 로 주입
  sqsQueueUrl: ""

backup:
  enabled: true
  schedule: "0 * * * *"
  # apply.sh 가 terraform output frontend_bucket_id(assets bucket) 로 주입
  s3Bucket: ""

# Ingress 설정. prod 는 default(internal+API GW), dev 는 environments/dev 에서 override
# host / wafAclArn 은 apply.sh 가 helm.parameters 로 주입
ingress:
  scheme: internal
  groupName: ""        # internal 일 땐 group 사용 안 함
  groupOrder: "30"
  host: ""             # internal 일 땐 비워두면 host rule 없이 catch-all
  wafAclArn: ""
  inboundCidrs: "10.0.0.0/16"  # internal ALB SG inbound (VPC Link)

externalSecret:
  # ClusterSecretStore 이름 (argocd/cluster-secret-store.yaml 에서 생성)
  secretStoreName: aws-parameter-store
  refreshInterval: 1h
  # SSM Parameter Store 키 경로
  dbWriterHostKey: /ticketing/prod/DB_WRITER_HOST
  dbReaderHostKey: /ticketing/prod/DB_READER_HOST
  dbUserKey: /ticketing/prod/DB_USER
  dbPasswordKey: /ticketing/prod/DB_PASSWORD
  elasticachePrimaryEndpointKey: /ticketing/prod/ELASTICACHE_PRIMARY_ENDPOINT
  redisHostKey: /ticketing/prod/REDIS_HOST
